<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ user.name }}'s Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container-fluid mt-3 px-3">

<div class="text-center mb-4">
  <h2>{{ user.name }}</h2>
  {% if user.profile_photo %}
  <img src="/static/uploads/{{ user.profile_photo }}" class="img-fluid rounded mb-3" style="max-width:250px;">
  {% endif %}
  <p><strong>Age:</strong> {{ user.age }}</p>
  <p><strong>Location:</strong> {{ user.location }}</p>
  <p><strong>Bio:</strong> {{ user.bio }}</p>

  <div class="d-grid gap-2 mt-3">
    <a class="btn btn-success btn-lg" href="/like/{{ user.id }}">❤️ Like</a>
    <a class="btn btn-secondary btn-lg" href="/discover">Back</a>
  </div>
</div>

</body>
</html>
