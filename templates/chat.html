<!DOCTYPE html>
<html>

<head>

<title>Chat</title>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Chat</h2>

<div id="messages" class="border p-3 mb-3" style="height:300px;overflow:auto;"></div>

<div id="typing"></div>

<input id="message" class="form-control" onkeypress="typingNow()">

<br>

<button class="btn btn-primary" onclick="sendMessage()">Send</button>

<script>

let socket = io()

let sender = "{{ session['user_id'] }}"
let receiver = "{{ user_id }}"

socket.on("message", function(data){

let box = document.getElementById("messages")

box.innerHTML += "<p>"+data.message+"</p>"

})

socket.on("typing", function(){

document.getElementById("typing").innerHTML="User typing..."

setTimeout(()=>{

document.getElementById("typing").innerHTML=""

},1500)

})

function sendMessage(){

let msg = document.getElementById("message").value

socket.send({

sender:sender,
receiver:receiver,
message:msg

})

document.getElementById("message").value=""

}

function typingNow(){

socket.emit("typing")

}

</script>

</body>
</html>
