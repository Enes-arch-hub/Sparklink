<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat with {{ match.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>
  <style>
    #chat-box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 5px;
    }
    .message {
      margin-bottom: 10px;
    }
    .message.user {
      text-align: right;
    }
    .message.friend {
      text-align: left;
    }
  </style>
</head>
<body class="container-fluid px-3 mt-3">

<h2 class="text-center mb-3">Chat with {{ match.name }}</h2>

<div id="chat-box" class="mb-3">
  {% for msg in messages %}
    <div class="message {% if msg.sender_id == user.id %}user{% else %}friend{% endif %}">
      <strong>{{ msg.sender_name }}:</strong> {{ msg.text }}
    </div>
  {% endfor %}
</div>

<form id="chat-form" class="d-flex gap-2">
  <input id="message-input" class="form-control flex-grow-1" type="text" placeholder="Type a message" required>
  <button class="btn btn-primary btn-lg" type="submit">Send</button>
</form>

<br>
<a href="/dashboard" class="btn btn-secondary w-100 mb-2">Back to Dashboard</a>
<a href="/discover" class="btn btn-info w-100">Discover</a>

<script>
  const socket = io();
  const form = document.getElementById('chat-form');
  const input = document.getElementById('message-input');
  const chatBox = document.getElementById('chat-box');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const message = input.value.trim();
    if (message) {
      socket.emit('send_message', {
        text: message,
        receiver_id: {{ match.id }},
      });
      input.value = '';
    }
  });

  socket.on('receive_message', function(msg) {
    const div = document.createElement('div');
    div.className = 'message friend';
    div.innerHTML = `<strong>${msg.sender_name}:</strong> ${msg.text}`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });

  // Scroll to bottom initially
  chatBox.scrollTop = chatBox.scrollHeight;
</script>

</body>
</html>
