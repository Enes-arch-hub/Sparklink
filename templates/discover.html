<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discover</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container-fluid mt-3 px-3">

<h2 class="mb-4 text-center">Discover New People</h2>

<div class="row row-cols-1 row-cols-md-2 g-3">
  {% for user in users %}
  <div class="col">
    <div class="card h-100">
      <a href="/view_profile/{{ user.id }}" class="text-decoration-none text-dark">
        {% if user.profile_photo %}
        <img src="/static/uploads/{{ user.profile_photo }}" class="card-img-top" alt="{{ user.name }}">
        {% else %}
        <img src="https://via.placeholder.com/400x300" class="card-img-top" alt="No photo">
        {% endif %}
        <div class="card-body">
          <h5 class="card-title">{{ user.name }}, {{ user.age }}</h5>
          <p class="card-text">{{ user.location }}</p>
          <p class="card-text">{{ user.bio|truncate(100) }}</p>
        </div>
      </a>
    </div>
  </div>
  {% endfor %}
</div>

<br>
<a href="/dashboard" class="btn btn-secondary w-100">Back to Dashboard</a>

</body>
</html>
